<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
  <div class="container mt-4" style="max-width: 80%;">
    <h1 class="text-primary mb-4">Quản Lý Người Mua Hàng</h1>

    <div class="mb-3">
      <form th:action="@{/admin/users}" method="get" class="input-group" style="max-width: 400px;">
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control" placeholder="Tìm theo tên người dùng...">
        <button class="btn btn-outline-primary" type="submit">Tìm kiếm</button>
      </form>
    </div>

    <div class="card shadow border-0">
      <div class="table-responsive">
        <!--Thông báo lỗi-->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <span th:text="${errorMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
          <span th:text="${successMessage}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
          <tr>
            <th>STT</th>
            <th>Mã người dùng</th>
            <th>Tên người dùng</th>
            <th>Vai trò</th>
            <th class="text-center">Thao tác</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="5" class="text-center py-4 fw-bold text-muted">Không có người mua hàng</td>
          </tr>

          <tr th:each="user, state : ${users}">
            <td th:text="${state.count}"></td>
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}" class="fw-bold"></td>
            <td>
              <select class="form-select form-select-sm"
                      th:onchange="'updateRole(' + ${user.id} + ', this.value)'"
                      style="width: 120px;">
                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Admin</option>
                <option value="USER" th:selected="${user.role == 'USER'}">User</option>
              </select>
            </td>
            <td class="text-center">
              <a th:href="@{'/admin/users/history/' + ${user.id}}"
                 class="btn btn-sm btn-info text-white me-1">
                <i class="bi bi-clock-history"></i> Xem lịch sử
              </a>
              <a th:href="@{'/admin/users/delete/' + ${user.id}}"
                 class="btn btn-sm btn-outline-danger"
                 onclick="return confirm('Cảnh báo: Hành động này có thể xóa toàn bộ lịch sử mua hàng của người dùng. Bạn vẫn muốn tiếp tục?')">
                <i class="bi bi-person-x"></i> Xóa tài khoản
              </a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function updateRole(userId, newRole) {
        fetch(`/admin/users/update-role?id=${userId}&role=${newRole}`, {
            method: 'POST'
        }).then(response => {
            if(response.ok) {
                alert('Cập nhật quyền thành công!');
            } else {
                alert('Lỗi khi cập nhật quyền.');
            }
        });
    }
  </script>
</section>
</html>
