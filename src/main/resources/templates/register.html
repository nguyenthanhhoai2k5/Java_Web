<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - Fashion Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .register-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            background: #ffffff;
        }
        .register-card h2 {
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #eee;
            background-color: #fdfdfd;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
            background-color: #fff;
        }
        .btn-register {
            background: linear-gradient(45deg, #0d6efd, #00d2ff);
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
            color: white;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .login-link a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>Tạo tài khoản</h2>

    <form th:action="@{/register}" method="post" th:object="${user}">
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Họ và Tên" th:field="*{fullName}" required>
        </div>
        <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Tên đăng nhập" th:field="*{username}" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" placeholder="Mật khẩu" id="password" th:field="*{password}" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" id="confirmPassword" required>
        </div>

        <button type="submit" class="btn-register">Đăng ký ngay</button>

        <div class="login-link">
            Bạn đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
        </div>
    </form>
</div>

<script>
    // Kiểm tra mật khẩu khớp nhau trước khi submit
    document.querySelector('form').onsubmit = function(e) {
        const pass = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pass !== confirm) {
            alert("Mật khẩu nhập lại không khớp!");
            e.preventDefault();
        }
    };
</script>

</body>
</html>
