<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Garden - Cửa Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-garden: #72B01D; --dark-navy: #22577A; --light-garden: #F0F7EE; }
        body { font-family: 'Quicksand', sans-serif; color: var(--dark-navy); background-color: #f8f9fa; }
        .top-bar { background-color: var(--dark-navy); color: #fff; font-size: 13px; padding: 6px 0; }
        .top-bar a { color: #fff; text-decoration: none; transition: 0.3s; }
        .top-bar a:hover { color: var(--primary-garden); }
        .navbar { background-color: #fff; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .logo-text { font-size: 26px; font-weight: 700; color: var(--primary-garden); text-decoration: none; }
        .logo-text span { color: var(--dark-navy); }
        .nav-link { font-weight: 600; color: var(--dark-navy); margin: 0 10px; }
        .nav-link:hover, .nav-link.active { color: var(--primary-garden) !important; }
        .search-box { max-width: 250px; }
        .search-box .form-control { font-size: 14px; border-radius: 50px 0 0 50px; }
        .search-box .btn { border-radius: 0 50px 50px 0; background-color: var(--primary-garden); color: #fff; border: none; }

        .cat-item { padding: 12px 15px; border-radius: 15px; transition: 0.3s; color: var(--dark-navy); text-decoration: none; display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 5px; }
        .cat-item:hover, .cat-item.active { background: var(--primary-garden); color: #fff !important; }
        .product-card { border: none; border-radius: 25px; border: 1px solid #f1f1f1; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .img-box { aspect-ratio: 1/1; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 25px 25px 0 0; overflow: hidden;}
        footer { background-color: #1A1C20; color: #fff; padding: 60px 0 20px; border-radius: 50px 50px 0 0; margin-top: 60px; }
        .footer-title { font-weight: 700; margin-bottom: 20px; color: var(--primary-garden); text-transform: uppercase; font-size: 16px; }
        .footer-link { color: #a0aabf; text-decoration: none; transition: 0.3s; display: block; margin-bottom: 10px; }
        .footer-link:hover { color: #fff; padding-left: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <div><i class="bi bi-telephone-fill me-2"></i>Hotline: <strong>0123 456 789</strong></div>
        <div class="d-flex gap-3">
            <a th:href="@{/admin/home}"><i class="bi bi-shield-lock-fill me-1"></i>Trang Quản Trị</a>
            <a href="#"><i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập</a>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="logo-text" th:href="@{/home}"><i class="bi bi-tree-fill me-2"></i>KIDS<span>GARDEN</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <i class="bi bi-list fs-1 text-dark"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-4 me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/shop}">Cửa hàng</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/promotions}">Khuyến mãi</a></li>
            </ul>
            <form class="d-flex search-box me-4" th:action="@{/search}" method="GET">
                <div class="input-group input-group-sm">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control border-end-0 shadow-none" placeholder="Tìm sản phẩm...">
                    <button class="btn px-3" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
            <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                <a th:href="@{/shop/cart}" class="text-dark position-relative">
                    <i class="bi bi-handbag fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 10px;" th:text="${cartCount ?: 0}">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                <h5 class="fw-bold mb-4">Loại Quần Áo</h5>
                <div class="d-flex flex-column">
                    <a th:href="@{/shop}" class="cat-item" th:classappend="${param.categoryId == null} ? 'active' : ''">
                        <span>Tất cả</span>
                    </a>
                    <a th:each="cat : ${categories}"
                       th:href="@{'/shop'(categoryId=${cat.id})}"
                       class="cat-item"
                       th:classappend="${param.categoryId != null and param.categoryId[0] == cat.id.toString()} ? 'active' : ''">
                        <span th:text="${cat.name}">Tên Loại</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <h4 class="fw-bold mb-4" th:if="${keyword != null}">Kết quả tìm kiếm cho: '<span th:text="${keyword}"></span>'</h4>

            <div class="row g-3">
                <div th:if="${products == null or products.empty}" class="col-12 text-center py-5">
                    <h5 class="text-muted">Không tìm thấy sản phẩm nào!</h5>
                </div>

                <div class="col-6 col-md-4" th:each="product : ${products}">
                    <div class="product-card">
                        <a th:href="@{'/shop/products/' + ${product.id}}" class="text-decoration-none text-dark">
                            <div class="img-box">
                                <img th:if="${product.image != null}" th:src="@{'/images/' + ${product.image}}" alt="Img" class="img-fluid w-100 h-100" style="object-fit: cover;">
                                <i th:unless="${product.image != null}" class="bi bi-camera text-muted fs-3"></i>
                            </div>
                            <div class="p-3 text-center">
                                <h6 class="fw-bold text-truncate" th:text="${product.name}">Tên SP</h6>
                                <p class="text-success fw-bold" th:text="${#numbers.formatDecimal(product.price != null ? product.price : 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <h5 class="fw-bold text-white mb-3"><i class="bi bi-tree-fill"></i> KIDS GARDEN</h5>
        <p class="text-white-50 small mb-0">© 2026 Kids Garden Fashion. Ươm mầm phong cách Việt.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
