<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Garden - Cửa Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-garden: #72B01D; --dark-navy: #22577A; --light-garden: #F0F7EE; }
        body { font-family: 'Quicksand', sans-serif; color: var(--dark-navy); background-color: #f8f9fa; }
        .top-bar { background-color: var(--dark-navy); color: #fff; font-size: 13px; padding: 6px 0; }
        .top-bar a { color: #fff; text-decoration: none; transition: 0.3s; }
        .top-bar a:hover { color: var(--primary-garden); }
        .navbar { background-color: #fff; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .logo-text { font-size: 26px; font-weight: 700; color: var(--primary-garden); text-decoration: none; }
        .logo-text span { color: var(--dark-navy); }
        .nav-link { font-weight: 600; color: var(--dark-navy); margin: 0 10px; }
        .nav-link:hover { color: var(--primary-garden); }
        .search-box { max-width: 250px; }
        .search-box .form-control { font-size: 14px; border-radius: 50px 0 0 50px; }
        .search-box .btn { border-radius: 0 50px 50px 0; background-color: var(--primary-garden); color: #fff; border: none; }

        .cat-item { padding: 12px 15px; border-radius: 15px; transition: 0.3s; color: var(--dark-navy); text-decoration: none; display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 5px; }
        .cat-item:hover, .cat-item.active { background: var(--primary-garden); color: #fff !important; }
        .nav-pills .nav-link.active { background-color: var(--primary-garden); }
        .product-card { border: none; border-radius: 25px; border: 1px solid #f1f1f1; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .img-box { aspect-ratio: 1/1; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 25px 25px 0 0; }
        footer { background-color: #1A1C20; color: #fff; padding: 60px 0 20px; border-radius: 50px 50px 0 0; margin-top: 60px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="logo-text" href="user_index.html"><i class="bi bi-tree-fill me-2"></i>KIDS<span>GARDEN</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <i class="bi bi-list fs-1 text-dark"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-4 me-auto">
                <li class="nav-item"><a class="nav-link" href="user_index.html">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="user_shop.html" style="color: var(--primary-garden) !important;">Cửa hàng</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Khuyến mãi</a></li>
            </ul>
            <form class="d-flex search-box me-4" action="/search" method="GET">
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control border-end-0 shadow-none" placeholder="Tìm sản phẩm...">
                    <button class="btn px-3" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
            <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                <a href="user_cart.html" class="text-dark position-relative">
                    <i class="bi bi-handbag fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 10px;">2</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                <h5 class="fw-bold mb-4">Loại Quần Áo</h5>
                <div class="d-flex flex-column">
                    <a href="#" class="cat-item active"><span>Tất cả</span><small>24</small></a>
                    <a href="#" class="cat-item"><span>Váy đầm bé gái</span><small>12</small></a>
                    <a href="#" class="cat-item"><span>Bộ đồ bé trai</span><small>08</small></a>
                </div>
            </div>
        </div>
        <div class="col-lg-9">
            <ul class="nav nav-pills mb-4" id="pills-tab">
                <li class="nav-item"><button class="nav-link active rounded-pill me-2 text-dark fw-bold" data-bs-toggle="pill" data-bs-target="#pills-new">MỚI NHẤT</button></li>
                <li class="nav-item"><button class="nav-link rounded-pill text-dark fw-bold" data-bs-toggle="pill" data-bs-target="#pills-hot">BÁN CHẠY</button></li>
            </ul>
            <div class="tab-content" id="pills-tabContent">
                <div class="tab-pane fade show active" id="pills-new">
                    <div class="row g-3">
                        <div class="col-6 col-md-4">
                            <div class="product-card">
                                <a href="user_product_detail.html" class="text-decoration-none text-dark">
                                    <div class="img-box"><i class="bi bi-camera text-muted fs-3"></i></div>
                                    <div class="p-3 text-center">
                                        <h6 class="fw-bold">Áo Thun Mầm Xanh</h6>
                                        <p class="text-success fw-bold">180.000đ</p>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-pane fade" id="pills-hot">
                    <div class="row g-3">
                        <div class="col-6 col-md-4">
                            <div class="product-card">
                                <a href="user_product_detail.html" class="text-decoration-none text-dark">
                                    <div class="img-box"><i class="bi bi-fire text-danger fs-3"></i></div>
                                    <div class="p-3 text-center">
                                        <h6 class="fw-bold">Yếm Kaki Cao Cấp</h6>
                                        <p class="text-danger fw-bold">320.000đ</p>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <h5 class="fw-bold text-white mb-3"><i class="bi bi-tree-fill"></i> KIDS GARDEN</h5>
        <p class="text-white-50 small mb-0">© 2026 Kids Garden Fashion. Ươm mầm phong cách Việt.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
