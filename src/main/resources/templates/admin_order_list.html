<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
  <div class="container mt-4" style="max-width: 95%;">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
      <span th:text="${message}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h1 class="mb-4 text-primary"><i class="bi bi-cart-check me-2"></i>Quản Lý Đơn Hàng</h1>

    <div class="d-flex justify-content-between mb-4">
      <form th:action="@{/admin/order}" method="get" class="input-group" style="max-width: 450px;">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo Mã đơn, SĐT khách...">
        <button class="btn btn-outline-primary" type="submit"><i class="bi bi-search"></i> Tìm kiếm</button>
        <a th:if="${keyword}" th:href="@{/admin/order}" class="btn btn-outline-danger"><i class="bi bi-x-lg"></i></a>
      </form>

      <div class="card bg-light px-4 py-2 border-primary border-start border-4">
        <span class="text-muted small">Tổng số đơn hàng</span>
        <h4 class="mb-0 fw-bold text-primary" th:text="${totalOrders != null ? totalOrders : 0}">0</h4>
      </div>
    </div>

    <div class="card shadow">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
          <tr>
            <th>Mã Đơn</th>
            <th>Khách Hàng</th>
            <th>Ngày Đặt</th>
            <th>Tổng Tiền</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="6" class="text-center py-4 fw-bold text-muted">Chưa có đơn hàng nào!</td>
          </tr>

          <tr th:each="order : ${orders}">
            <td><a th:href="@{'/admin/order/detail/' + ${order.id}}" class="fw-bold text-decoration-none" th:text="${order.orderCode}">OD001</a></td>
            <td>
              <div class="fw-bold" th:text="${order.customerName}">Nguyễn Văn A</div>
              <small class="text-muted" th:text="${order.phone}">0901234567</small>
            </td>
            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">12/05/2026</td>
            <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
            <td>
              <form th:action="@{/admin/order/update-status}" method="POST" class="d-flex align-items-center">
                <input type="hidden" name="orderId" th:value="${order.id}">
                <select name="status" class="form-select form-select-sm" style="max-width: 140px;">
                  <option value="Đang xử lý" th:selected="${order.status == 'Đang xử lý'}">Đang xử lý</option>
                  <option value="Đã giao hàng" th:selected="${order.status == 'Đã giao hàng'}">Đã giao</option>
                  <option value="Đã hủy" th:selected="${order.status == 'Đã hủy'}">Đã hủy</option>
                </select>
                <button type="submit" class="btn btn-sm btn-success ms-1" title="Cập nhật"><i class="bi bi-check2"></i></button>
              </form>
            </td>
            <td>
              <a th:href="@{'/admin/order/detail/' + ${order.id}}" class="btn btn-sm btn-outline-dark"><i class="bi bi-eye"></i> Xem</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</section>
</html>
