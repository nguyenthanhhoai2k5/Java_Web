<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kids Garden - Thanh Toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-garden: #72B01D; --dark-navy: #22577A; }
        body { font-family: 'Quicksand', sans-serif; background-color: #f8f9fa; color: var(--dark-navy);}
        .navbar { background-color: #fff; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .logo-text { font-size: 26px; font-weight: 700; color: var(--primary-garden); text-decoration: none; }
        .logo-text span { color: var(--dark-navy); }
        .btn-garden { background-color: var(--primary-garden); color: #fff; border-radius: 50px; font-weight: 700; padding: 12px; }
        .btn-garden:hover { background-color: var(--dark-navy); color: #fff; }
    </style>
</head>
<body>

<nav class="navbar shadow-sm mb-5">
    <div class="container d-flex justify-content-between">
        <a class="logo-text" th:href="@{/home}"><i class="bi bi-tree-fill me-2"></i>KIDS<span>GARDEN</span></a>
        <span class="fs-5 fw-bold text-secondary"><i class="bi bi-shield-lock me-2"></i>Thanh Toán An Toàn</span>
    </div>
</nav>

<div class="container pb-5">
    <form th:action="@{/checkout/process}" th:object="${order}" method="POST">
        <div class="row g-5">
            <div class="col-lg-7">
                <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                    <h4 class="fw-bold mb-4"><i class="bi bi-geo-alt-fill text-danger me-2"></i>Thông tin giao hàng</h4>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên người nhận</label>
                        <input type="text" class="form-control" th:field="*{customerName}" required placeholder="VD: Nguyễn Văn A">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Số điện thoại</label>
                            <input type="text" class="form-control" th:field="*{phone}" required placeholder="VD: 0901234567">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email (Không bắt buộc)</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="VD: email@gmail.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ giao hàng chi tiết</label>
                        <textarea class="form-control" th:field="*{address}" rows="3" required placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP"></textarea>
                    </div>

                    <h5 class="fw-bold mt-5 mb-3"><i class="bi bi-credit-card-2-front-fill text-primary me-2"></i>Phương thức thanh toán</h5>
                    <div class="form-check border rounded p-3 mb-2 bg-light">
                        <input class="form-check-input ms-1" type="radio" name="payment" id="cod" checked>
                        <label class="form-check-label ms-2 fw-bold" for="cod">Thanh toán khi nhận hàng (COD)</label>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="bg-white p-4 rounded-4 shadow-sm border border-light sticky-top" style="top: 20px;">
                    <h5 class="fw-bold mb-4">Đơn hàng của bạn (<span th:text="${totalItems}">0</span> sản phẩm)</h5>

                    <div class="d-flex align-items-center justify-content-between border-bottom pb-3 mb-3" th:each="item : ${cartItems}">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-light rounded p-2 text-center" style="width: 50px; height: 50px;">
                                <i class="bi bi-box-seam text-muted fs-4"></i>
                            </div>
                            <div>
                                <h6 class="fw-bold mb-0 text-truncate" style="max-width: 180px;" th:text="${item.productName}">Tên SP</h6>
                                <small class="text-muted">SL: x<span th:text="${item.quantity}">1</span></small>
                            </div>
                        </div>
                        <span class="fw-bold text-dark" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Tạm tính</span>
                        <span class="fw-bold" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
                        <span class="text-muted">Phí giao hàng</span>
                        <span class="text-success">Miễn phí</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold fs-5">Tổng cộng</span>
                        <span class="fw-bold fs-3 text-success" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>

                    <button type="submit" class="btn btn-garden w-100 fs-5 shadow">ĐẶT HÀNG NGAY</button>
                    <a th:href="@{/shop/cart}" class="d-block text-center mt-3 text-decoration-none text-muted"><i class="bi bi-arrow-left"></i> Quay lại giỏ hàng</a>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
