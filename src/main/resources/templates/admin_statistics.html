<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
    <div class="container mt-4" style="max-width: 95%;">
        <h1 class="mb-4 text-primary"><i class="bi bi-graph-up-arrow me-2"></i>Báo Cáo Thống Kê</h1>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-4 border-0 shadow-sm text-white" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
                    <h6 class="text-uppercase mb-2 opacity-75">Doanh thu tháng này</h6>
                    <h2 class="fw-bold mb-0" th:text="${currentMonthSales != null ? currentMonthSales : '0đ'}">0đ</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-0 shadow-sm text-white" style="background: linear-gradient(135deg, #2F80ED, #56CCF2);">
                    <h6 class="text-uppercase mb-2 opacity-75">Đơn hàng tháng này</h6>
                    <h2 class="fw-bold mb-0" th:text="${currentMonthOrders != null ? currentMonthOrders : 0}">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-0 shadow-sm text-white" style="background: linear-gradient(135deg, #FF416C, #FF4B2B);">
                    <h6 class="text-uppercase mb-2 opacity-75">Sản phẩm bán chạy nhất</h6>
                    <h5 class="fw-bold mb-0" th:text="${bestSellingProduct != null ? bestSellingProduct : 'Chưa có dữ liệu'}">Tên SP</h5>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card shadow border-0 p-4">
                    <h5 class="fw-bold text-secondary mb-4">Biểu đồ tổng quan (Cần tích hợp Chart.js)</h5>
                    <div class="bg-light rounded d-flex align-items-center justify-content-center" style="height: 300px; border: 2px dashed #ccc;">
                        <span class="text-muted"><i class="bi bi-bar-chart-line fs-1 d-block text-center"></i> Khu vực hiển thị biểu đồ</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
