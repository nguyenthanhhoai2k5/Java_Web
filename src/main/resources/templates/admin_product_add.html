<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
  <!--Thông báo-->
  <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${message}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>

  <div class="container mt-4" style="max-width: 80%;">
    <div class="mb-3">
      <a th:href="@{/admin/category}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i> ← Trở về
      </a>
    </div>

    <div class="card shadow">
      <div class="card-header bg-white">
        <!-- Tiêu đề động -->
        <h1 class="h3 mb-0 text-primary" th:text="${product.id != null ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm'}"></h1>
      </div>

      <div class="card-body">
        <!-- Form dùng chung -->
        <form th:action="@{/admin/coupons/save}" th:object="${coupon}" method="post">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label fw-bold">Mã giảm giá</label>
                <input type="text" th:field="*{code}" class="form-control" placeholder="Nhập mã (VD: GIAM20)">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Tên chương trình</label>
                <input type="text" th:field="*{description}" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Loại sản phẩm áp dụng</label>
                <select name="categoryIds" class="form-select" multiple style="height: 120px;" required>
                  <option th:each="cat : ${categories}"
                          th:value="${cat.id}"
                          th:text="${cat.name}"></option>
                </select>
                <small class="text-muted">Giữ phím Ctrl (hoặc Cmd) để chọn nhiều loại</small>
              </div>
            </div>

            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label fw-bold">Giá trị & Loại giảm</label>
                <div class="input-group">
                  <input type="number" th:field="*{discountValue}" class="form-control" step="0.1">
                  <select th:field="*{discountType}" class="form-select" style="max-width: 100px;">
                    <option value="percent">%</option>
                    <option value="amount">VNĐ</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-6">
                  <label class="form-label fw-bold">Ngày bắt đầu</label>
                  <input type="date" th:field="*{startDate}" class="form-control" required>
                </div>
                <div class="col-6">
                  <label class="form-label fw-bold">Ngày kết thúc</label>
                  <input type="date" th:field="*{endDate}" class="form-control" required>
                </div>
              </div>

              <div class="mb-3 mt-3">
                <label class="form-label fw-bold">Trạng thái</label>
                <select th:field="*{status}" class="form-select">
                  <option value="Còn hiệu lực">Còn hiệu lực</option>
                  <option value="Tạm dừng">Tạm dừng</option>
                  <option value="Hết hạn">Hết hạn</option>
                </select>
              </div>
            </div>
          </div>
          <div class="text-center mt-4">
            <button type="submit" class="btn btn-success px-5">Lưu dữ liệu</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
</html>
