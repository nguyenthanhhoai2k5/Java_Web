<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
    <div class="container mt-4" style="max-width: 90%;"> <h1 class="mb-4 text-primary">Quản Lý Mã Giảm Giá</h1>

        <div class="d-flex justify-content-between mb-3">
            <form th:action="@{/admin/coupons}" method="get" class="input-group" style="max-width: 450px;">
                <input type="text" name="keyword" th:value="${keyword}"
                       class="form-control" placeholder="Nhập mã hoặc tên chương trình...">
                <button class="btn btn-outline-primary" type="submit">
                    <i class="bi bi-search"></i> Tìm kiếm
                </button>
                <a th:if="${keyword}" th:href="@{/admin/coupons}" class="btn btn-outline-danger">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>

            <a th:href="@{/admin/coupons/add}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Thêm mã giảm giá
            </a>
        </div>

        <div class="card shadow">
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>STT</th>
                        <th>Mã</th>
                        <th>Tên chương trình</th>
                        <th>Loại SP áp dụng</th>
                        <th>Giá trị</th>
                        <th>Bắt đầu</th>
                        <th>Kết thúc</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(coupons)}">
                            <td colspan="9" class="text-center py-4 fw-bold text-muted">Không có mã giảm giá nào được tìm thấy</td>
                        </tr>

                        <tr th:each="cp, state : ${coupons}">
                            <td th:text="${state.count}">1</td>
                            <td>
                                <span class="badge bg-light text-dark border" th:text="${cp.code}">KM2024</span>
                            </td>
                            <td th:text="${cp.description}">Tên chương trình</td>

                            <td>
                <span th:each="cat, iterStat : ${cp.appliedCategories}">
                    <span th:text="${cat.name}"></span>
                    <th:block th:if="${!iterStat.last}">, </th:block>
                </span>
                                <span th:if="${#lists.isEmpty(cp.appliedCategories)}" class="text-muted small">Tất cả</span>
                            </td>

                            <td>
                                <span th:text="${cp.discountValue}"></span>
                                <span th:text="${cp.discountType == 'percent' ? '%' : 'VNĐ'}"></span>
                            </td>

                            <td th:text="${cp.startDate}">01/01/2026</td>
                            <td th:text="${cp.endDate}">31/12/2026</td>

                            <td>
                                <span th:if="${cp.status == 'Còn hiệu lực'}" class="badge bg-success">Còn hiệu lực</span>
                                <span th:if="${cp.status == 'Hết hạn'}" class="badge bg-danger">Hết hạn</span>
                                <span th:if="${cp.status == 'Tạm dừng'}" class="badge bg-warning text-dark">Tạm dừng</span>
                            </td>

                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{'/admin/coupons/edit/' + ${cp.id}}" class="btn btn-sm btn-info text-white">
                                        <i class="bi bi-pencil-square"></i> Sửa
                                    </a>
                                    <a th:href="@{'/admin/coupons/delete/' + ${cp.id}}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa mã này?')">
                                        <i class="bi bi-trash"></i> Xóa
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</html>
