<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
    <div class="container-fluid mt-3" style="width: 80%;">
        <ul class="nav nav-tabs" id="categoryTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active"
                        id="type-tab"
                        data-bs-toggle="tab"
                        data-bs-target="#type-content"
                        type="button"
                        role="tab">
                    Loại sản phẩm
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link"
                        id="product-tab"
                        data-bs-toggle="tab"
                        data-bs-target="#product-content"
                        type="button"
                        role="tab">
                    Sản phẩm
                </button>
            </li>
        </ul>

        <div class="tab-content border border-top-0 p-4" id="categoryTabContent">
            <div class="tab-pane fade show active" id="type-content" role="tabpanel">
                <h1 class="mb-4">Quản lý loại sản phẩm</h1>
                <div class="row">
                    <div class="col-md-6 border-end">
                        <h4 class="text-secondary">Danh sách loại</h4>
                        <table class="table table-hover table-bordered mt-3">
                            <thead class="table-light">
                            <tr>
                                <th>STT</th>
                                <th>Tên loại</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="cat, state : ${categories}"
                                th:data-id="${cat.id}"
                                th:data-name="${cat.name}"
                                onclick="fillCategoryForm(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                style="cursor: pointer;">
                                <td th:text="${state.count}"></td>
                                <td th:text="${cat.name}"></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(categories)}">
                                <td colspan="2" class="text-center">Không có loại sản phẩm nào</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="col-md-6 ps-4">
                        <h4 class="text-secondary">Thao tác</h4>
                        <form th:action="@{/admin/category/save}" th:object="${category}" method="post">
                            <input type="hidden" th:field="*{id}" id="catId">

                            <div class="mb-3">
                                <label class="form-label">ID</label>
                                <input type="text" class="form-control" id="catDisplayId" readonly placeholder="ID tự động">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tên loại sản phẩm</label>
                                <input type="text" class="form-control" th:field="*{name}" id="catName" required>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">Lưu</button>
                                <button type="button" class="btn btn-danger" onclick="deleteCategory()">Xóa</button>
                                <a th:href="@{/admin/category}" class="btn btn-secondary">Làm mới</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="product-content" role="tabpanel">
                <h1 class="mb-4">Quản lý sản phẩm</h1>

                <div class="d-flex justify-content-between mb-3">
                    <form th:action="@{/admin/category}" method="get" class="input-group" style="max-width: 420px;">
                        <input type="text"
                               name="keyword"
                               th:value="${keyword}"
                               class="form-control"
                               placeholder="Nhập tên sản phẩm">
                        <button class="btn btn-outline-secondary" type="submit">Tìm kiếm</button>
                        <a th:if="${keyword}" th:href="@{/admin/category}" class="btn btn-outline-danger">X</a>
                    </form>

                    <a th:href="@{/admin/product/add}" class="btn btn-success">Thêm sản phẩm</a>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-striped align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>STT</th>
                            <th>Tên sản phẩm</th>
                            <th>Loại sản phẩm</th>
                            <th>Số lượng</th>
                            <th>Giá</th>
                            <th>Trạng thái</th>
                            <th>Ảnh sản phẩm</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="8" class="text-center fw-bold py-4 text-danger">Không có sản phẩm nào trong hệ thống</td>
                        </tr>

                        <tr th:each="prod, state : ${products}">
                            <td th:text="${state.count}"></td>
                            <td th:text="${prod.name}"></td>
                            <td th:text="${prod.category != null ? prod.category.name : 'N/A'}"></td>
                            <td th:text="${prod.quantity}"></td>
                            <td th:text="${T(java.lang.Math).round(prod.price) + ' VND'}"></td>
                            <td>
                                <span th:if="${prod.status == 'Mới'}" class="badge bg-success">Mới</span>
                                <span th:if="${prod.status == 'Cũ'}" class="badge bg-warning text-dark">Cũ</span>
                            </td>
                            <td>
                                <img th:if="${prod.image != null}"
                                     th:src="@{'/images/' + ${prod.image}}"
                                     alt="Sản phẩm"
                                     width="120"
                                     class="img-thumbnail">
                            </td>
                            <td>
                                <a th:href="@{'/admin/product/edit/' + ${prod.id}}" class="btn btn-sm btn-info text-white">Sửa</a>
                                <a th:href="@{'/admin/product/delete/' + ${prod.id}}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">Xóa</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${totalPages != null and totalPages > 1}" class="d-flex justify-content-center mt-3">
                    <nav aria-label="Page navigation">
                        <ul class="pagination">
                            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/category(p=${currentPage - 1}, keyword=${keyword})}">Trước</a>
                            </li>

                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(1, totalPages)}"
                                th:classappend="${currentPage == i} ? 'active'">
                                <a class="page-link" th:href="@{/admin/category(p=${i}, keyword=${keyword})}" th:text="${i}"></a>
                            </li>

                            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/category(p=${currentPage + 1}, keyword=${keyword})}">Sau</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fillCategoryForm(id, name) {
            document.getElementById("catId").value = id;
            document.getElementById("catDisplayId").value = id;
            document.getElementById("catName").value = name;
        }

        function deleteCategory() {
            const id = document.getElementById("catId").value;
            if (!id) {
                alert("Vui lòng chọn loại sản phẩm để xóa");
                return;
            }

            if (confirm("Xác nhận xóa loại sản phẩm này?")) {
                window.location.href = "/admin/category/delete/" + id;
            }
        }

        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has("keyword")) {
                const productTab = new bootstrap.Tab(document.querySelector("#product-tab"));
                productTab.show();
            }
        };
    </script>
</section>
</html>
