<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f7ee; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .success-card { background: white; border-radius: 30px; padding: 50px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .check-icon { font-size: 80px; color: #72B01D; margin-bottom: 20px; }
        .btn-garden { background-color: #72B01D; color: #fff; border-radius: 50px; font-weight: 700; padding: 12px 30px; text-decoration: none; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn-garden:hover { background-color: #22577A; color: white; }
    </style>
</head>
<body>

<div class="success-card">
    <i class="bi bi-check-circle-fill check-icon"></i>
    <h2 class="fw-bold text-dark mb-3">Đặt Hàng Thành Công!</h2>
    <p class="text-muted mb-4">Cảm ơn bạn đã mua sắm tại Kids Garden. Đơn hàng của bạn đang được xử lý.</p>

    <div class="bg-light rounded p-3 mb-4 border border-dashed">
        <span class="text-muted d-block mb-1">Mã đơn hàng của bạn:</span>
        <h4 class="fw-bold text-primary mb-0" th:text="${orderCode != null ? orderCode : 'N/A'}">OD123456</h4>
    </div>

    <p class="small text-muted mb-0">Chúng tôi sẽ sớm liên hệ với bạn để xác nhận đơn hàng.</p>

    <a th:href="@{/shop}" class="btn-garden shadow-sm"><i class="bi bi-cart me-2"></i>Tiếp tục mua sắm</a>
</div>

</body>
</html>
