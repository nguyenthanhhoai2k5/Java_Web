<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Garden - Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-garden: #72B01D; --dark-navy: #22577A; --light-garden: #F0F7EE; }
        body { font-family: 'Quicksand', sans-serif; color: var(--dark-navy); background-color: #f8f9fa; }
        .top-bar { background-color: var(--dark-navy); color: #fff; font-size: 13px; padding: 6px 0; }
        .top-bar a { color: #fff; text-decoration: none; transition: 0.3s; }
        .top-bar a:hover { color: var(--primary-garden); }
        .navbar { background-color: #fff; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .logo-text { font-size: 26px; font-weight: 700; color: var(--primary-garden); text-decoration: none; }
        .logo-text span { color: var(--dark-navy); }
        .nav-link { font-weight: 600; color: var(--dark-navy); margin: 0 10px; }
        .nav-link:hover, .nav-link.active { color: var(--primary-garden) !important; }
        .search-box { max-width: 250px; }
        .search-box .form-control { font-size: 14px; border-radius: 50px 0 0 50px; }
        .search-box .btn { border-radius: 0 50px 50px 0; background-color: var(--primary-garden); color: #fff; border: none; }
        .product-gallery { background: #fff; border-radius: 30px; height: 500px; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; overflow: hidden;}
        .btn-garden { background-color: var(--primary-garden); color: #fff; border-radius: 50px; border: none; font-weight: 700; transition: 0.3s; }
        .btn-garden:hover { background-color: var(--dark-navy); color: #fff; }
        footer { background-color: #1A1C20; color: #fff; padding: 60px 0 20px; border-radius: 50px 50px 0 0; margin-top: 60px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <div><i class="bi bi-telephone-fill me-2"></i>Hotline: <strong>0123 456 789</strong></div>
        <div class="d-flex gap-3">
            <a th:href="@{/admin/home}"><i class="bi bi-shield-lock-fill me-1"></i>Trang Quản Trị</a>
            <a href="#"><i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập</a>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="logo-text" th:href="@{/home}"><i class="bi bi-tree-fill me-2"></i>KIDS<span>GARDEN</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <i class="bi bi-list fs-1 text-dark"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-4 me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/shop}">Cửa hàng</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/promotions}">Khuyến mãi</a></li>
            </ul>
            <form class="d-flex search-box me-4" th:action="@{/search}" method="GET">
                <div class="input-group input-group-sm">
                    <input type="text" name="keyword" class="form-control border-end-0 shadow-none" placeholder="Tìm sản phẩm...">
                    <button class="btn px-3" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
            <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                <a th:href="@{/shop/cart}" class="text-dark position-relative">
                    <i class="bi bi-handbag fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 10px;" th:text="${cartCount ?: 0}">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb small">
            <li class="breadcrumb-item"><a th:href="@{/home}" class="text-decoration-none text-muted">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/shop}" class="text-decoration-none text-muted">Cửa hàng</a></li>
            <li class="breadcrumb-item active fw-bold" aria-current="page" th:text="${product.name}">Tên SP</li>
        </ol>
    </nav>

    <div class="row g-5 bg-white p-4 rounded-4 shadow-sm border border-light">
        <div class="col-md-5">
            <div class="product-gallery">
                <img th:if="${product.image != null}" th:src="@{'/images/' + ${product.image}}" alt="Ảnh" class="img-fluid w-100 h-100" style="object-fit: cover;">
                <i th:unless="${product.image != null}" class="bi bi-camera text-muted" style="font-size: 80px;"></i>
            </div>
        </div>

        <div class="col-md-7">
            <span class="badge bg-success mb-2" th:text="${product.category != null ? product.category.name : 'Chung'}">Danh mục</span>
            <h2 class="fw-bold mb-2" th:text="${product.name}">Tên SP</h2>

            <h3 class="text-success fw-bold mb-4" th:text="${#numbers.formatDecimal(product.price != null ? product.price : 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</h3>

            <p class="mb-4 text-secondary" th:text="${product.description}">Mô tả chi tiết...</p>

            <form th:action="@{/shop/cart/add}" method="POST">
                <input type="hidden" name="productId" th:value="${product.id}">
                <div class="d-flex align-items-center gap-4 mb-4">
                    <div class="input-group" style="width: 130px;">
                        <button class="btn btn-outline-secondary rounded-start-pill px-3" type="button" onclick="this.nextElementSibling.stepDown()">-</button>
                        <input type="number" class="form-control text-center border-secondary" name="quantity" value="1" min="1" th:max="${product.quantity}">
                        <button class="btn btn-outline-secondary rounded-end-pill px-3" type="button" onclick="this.previousElementSibling.stepUp()">+</button>
                    </div>
                    <span class="text-muted small">Còn <span th:text="${product.quantity}"></span> sản phẩm</span>
                </div>

                <button type="submit" class="btn btn-garden btn-lg px-5 shadow-sm" th:disabled="${product.quantity == 0}">
                    <i class="bi bi-cart-plus me-2"></i>THÊM VÀO GIỎ
                </button>
            </form>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <h5 class="fw-bold text-white mb-3"><a th:href="@{/home}" class="text-white text-decoration-none"><i class="bi bi-tree-fill"></i> KIDS GARDEN</a></h5>
        <p class="text-white-50 small mb-0">© 2026 Kids Garden Fashion.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
