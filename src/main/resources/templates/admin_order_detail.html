<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
    <div class="container mt-4" style="max-width: 90%;">
        <div class="mb-3 d-flex justify-content-between align-items-center">
            <h1 class="h3 text-primary"><i class="bi bi-receipt me-2"></i>Chi Tiết Đơn Hàng: <span th:text="${order.orderCode}">OD001</span></h1>
            <a th:href="@{/admin/order}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Trở về</a>
        </div>

        <div class="row g-4">
            <div class="col-md-8">
                <div class="card shadow border-0 h-100">
                    <div class="card-header bg-white"><h5 class="mb-0 fw-bold">Danh sách sản phẩm</h5></div>
                    <div class="card-body">
                        <table class="table align-middle">
                            <thead class="table-light">
                            <tr><th>Sản Phẩm</th><th>Đơn Giá</th><th>SL</th><th>Thành Tiền</th></tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(orderDetails)}">
                                <td colspan="4" class="text-center py-3 text-muted">Không có chi tiết sản phẩm.</td>
                            </tr>
                            <tr th:each="item : ${orderDetails}">
                                <td>
                                    <div class="d-flex align-items-center">
                                        <img th:if="${item.product.image != null}" th:src="@{'/images/' + ${item.product.image}}" class="rounded me-2" style="width: 40px; height: 40px; object-fit: cover;">
                                        <span th:text="${item.product.name}">Tên SP</span>
                                    </div>
                                </td>
                                <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                                <td th:text="${item.quantity}">1</td>
                                <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                            </tr>
                            </tbody>
                        </table>
                        <hr>
                        <div class="d-flex justify-content-between fs-5 fw-bold text-danger">
                            <span>Tổng thanh toán:</span>
                            <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow border-0 mb-4">
                    <div class="card-header bg-white"><h5 class="mb-0 fw-bold">Khách hàng</h5></div>
                    <div class="card-body">
                        <p class="mb-2"><i class="bi bi-person-fill me-2 text-primary"></i> <strong th:text="${order.customerName}">Tên KH</strong></p>
                        <p class="mb-2"><i class="bi bi-telephone-fill me-2 text-primary"></i> <span th:text="${order.phone}">SĐT</span></p>
                        <p class="mb-0"><i class="bi bi-envelope-fill me-2 text-primary"></i> <span th:text="${order.email}">Email</span></p>
                    </div>
                </div>
                <div class="card shadow border-0">
                    <div class="card-header bg-white"><h5 class="mb-0 fw-bold">Giao hàng</h5></div>
                    <div class="card-body">
                        <p class="mb-0"><i class="bi bi-geo-alt-fill me-2 text-danger"></i> <span th:text="${order.address}">Địa chỉ</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
