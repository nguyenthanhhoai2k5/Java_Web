<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Kids Garden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #F0F7EE; font-family: sans-serif;}
        .login-card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; }
        .btn-garden { background-color: #72B01D; color: white; border-radius: 50px; font-weight: bold; }
        .btn-garden:hover { background-color: #5a8f15; color: white; }
        .btn-google { background-color: white; color: #444; border: 1px solid #ddd; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-google:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card login-card p-5" style="width: 450px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #72B01D;"><i class="bi bi-tree-fill"></i> KIDS GARDEN</h2>
        <p class="text-muted">Đăng nhập để tiếp tục</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger rounded-pill text-center small">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>Sai email hoặc mật khẩu!
    </div>

    <div th:if="${param.logout}" class="alert alert-success rounded-pill text-center small">
        <i class="bi bi-check-circle-fill me-1"></i>Bạn đã đăng xuất thành công!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <input type="email" name="username" class="form-control rounded-pill px-4 py-2" placeholder="Email của bạn" required autofocus>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control rounded-pill px-4 py-2" placeholder="Mật khẩu" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4 px-2 small">
            <label class="form-check-label">
                <input type="checkbox" name="remember-me" class="form-check-input me-1"> Nhớ mật khẩu
            </label>
            <a th:href="@{/forgot-password}" class="text-success text-decoration-none fw-bold" style="font-size: 14px;">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-garden w-100 py-2 mb-3">ĐĂNG NHẬP</button>
    </form>

    <div class="text-center text-muted mb-3 small">HOẶC</div>

    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 py-2 mb-4 d-flex align-items-center justify-content-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" class="me-2">
        Đăng nhập với Google
    </a>

    <div class="text-center small">
        Chưa có tài khoản?
        <a th:href="@{/register}" class="text-success fw-bold text-decoration-none">Đăng ký ngay</a>
    </div>
</div>

</body>
</html>
