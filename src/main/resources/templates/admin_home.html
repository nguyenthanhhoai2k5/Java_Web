<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<head>
    <style>
        /* Giữ lại style inline cho các phần tử */
    </style>
</head>
<section>
    <div style="background-color: #edf7e9; padding: 20px 30px; min-height: 100vh; width: 100%; box-sizing: border-box; text-align: center; align-items: center; justify-content: center; height: 100vh; border-radius: 24px;">
        <div style="background: linear-gradient(135deg, #ffffff 0%, #fefef9 100%); border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08); overflow: hidden; padding: 3rem 2rem; text-align: center; transition: all 0.3s ease; border: 1px solid rgba(76, 175, 80, 0.15); animation: fadeInUp 0.5s ease-out;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 1.5rem; flex-wrap: wrap; color: #1c3a1b;">
                <div style="width: 70px; height: 70px; background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);">
                    <i class="fas fa-crown" style="font-size: 2.5rem; color: white;"></i>
                </div>
                <h1 style="font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, #1f4f2b 0%, #4caf50 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0; letter-spacing: -0.5px;">Welcome Admin!</h1>
            </div>

            <div style="margin: 2rem 0; padding: 1rem;">
                <p style="font-size: 1.2rem; color: #2c5e2e; font-weight: 500; margin-bottom: 0.75rem; background: #eaf5e6; display: inline-block; padding: 0.75rem 1.5rem; border-radius: 50px; box-shadow: 0 2px 6px rgba(0,0,0,0.03);">
                    <i class="fas fa-store me-2"></i>
                    Chào mừng bạn quay trở lại với hệ thống quản trị cửa hàng thời trang.
                </p>
                <p style="font-size: 1rem; color: #4a6b3c; margin-bottom: 0; background: #f8fbf5; display: inline-block; padding: 0.5rem 1.5rem; border-radius: 50px;">
                    <i class="fas fa-arrow-left me-2"></i>
                    Hãy chọn các mục bên trái để bắt đầu quản lý.
                </p>
            </div>

            <div style="display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%); color: white; padding: 0.8rem 2rem; border-radius: 50px; font-size: 1.1rem; margin-top: 1rem; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.25);">
                <i class="fas fa-calendar-alt me-2" style="font-size: 1.2rem;"></i>
                Hôm nay là ngày:
                <strong style="font-weight: 700; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 30px; margin-left: 5px;" th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></strong>
            </div>
        </div>
    </div>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .inline-dashboard-content {
                padding: 15px !important;
            }
        }
    </style>
</section>
</html>
