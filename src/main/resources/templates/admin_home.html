<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin_layout :: layout}">
<section>
    <div class="dashboard-content">
        <div class="dashboard-card">
            <div class="welcome-header">
                <div class="welcome-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 class="welcome-title">Welcome Admin!</h1>
            </div>

            <div class="welcome-message">
                <p class="greeting-text">
                    <i class="fas fa-store me-2"></i>
                    Chào mừng bạn quay trở lại với hệ thống quản trị cửa hàng thời trang.
                </p>
                <p class="instruction-text">
                    <i class="fas fa-arrow-left me-2"></i>
                    Hãy chọn các mục bên trái để bắt đầu quản lý.
                </p>
            </div>

            <div class="date-info">
                <i class="fas fa-calendar-alt me-2"></i>
                Hôm nay là ngày:
                <strong th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy')}"></strong>
            </div>
        </div>
    </div>
</section>

<style>
    /* CSS giống với giao diện Quản lý danh mục & sản phẩm */

    /* Container nội dung chính */
    .dashboard-content {
        background-color: #edf7e9;
        padding: 20px 30px;
        min-height: 100vh;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        align-items: center;
        justify-content: center;
        height: 100vh;
        border: 2px whitesmoke;
        border-radius: 24px;
    }

    /* Card chính */
    .dashboard-card {
        background: linear-gradient(135deg, #ffffff 0%, #fefef9 100%);
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        padding: 3rem 2rem;
        text-align: center;
        transition: all 0.3s ease;
        border: 1px solid rgba(76, 175, 80, 0.15);
    }

    .dashboard-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 25px 50px rgba(76, 175, 80, 0.12);
    }

    /* Header với icon */
    .welcome-header {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }

    .welcome-icon {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
    }

    .welcome-icon i {
        font-size: 2.5rem;
        color: white;
    }

    .welcome-title {
        font-size: 2.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #1f4f2b 0%, #4caf50 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
        letter-spacing: -0.5px;
    }

    /* Nội dung tin nhắn */
    .welcome-message {
        margin: 2rem 0;
        padding: 1rem;
    }

    .greeting-text {
        font-size: 1.2rem;
        color: #2c5e2e;
        font-weight: 500;
        margin-bottom: 0.75rem;
        background: #eaf5e6;
        display: inline-block;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .instruction-text {
        font-size: 1rem;
        color: #4a6b3c;
        margin-bottom: 0;
        background: #f8fbf5;
        display: inline-block;
        padding: 0.5rem 1.5rem;
        border-radius: 50px;
    }

    /* Thông tin ngày tháng */
    .date-info {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #4caf50 0%, #66bb6a 100%);
        color: white;
        padding: 0.8rem 2rem;
        border-radius: 50px;
        font-size: 1.1rem;
        margin-top: 1rem;
        box-shadow: 0 4px 12px rgba(76, 175, 80, 0.25);
    }

    .date-info i {
        font-size: 1.2rem;
    }

    .date-info strong {
        font-weight: 700;
        background: rgba(255,255,255,0.2);
        padding: 4px 12px;
        border-radius: 30px;
        margin-left: 5px;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .dashboard-content {
            padding: 15px;
        }

        .dashboard-card {
            padding: 2rem 1rem;
        }

        .welcome-title {
            font-size: 1.6rem;
        }

        .welcome-icon {
            width: 55px;
            height: 55px;
        }

        .welcome-icon i {
            font-size: 2rem;
        }

        .greeting-text {
            font-size: 1rem;
            padding: 0.5rem 1rem;
        }

        .instruction-text {
            font-size: 0.9rem;
        }

        .date-info {
            font-size: 0.9rem;
            padding: 0.6rem 1.2rem;
        }
    }

    /* Hiệu ứng animation nhẹ */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .dashboard-card {
        animation: fadeInUp 0.5s ease-out;
    }
</style>
</html>
