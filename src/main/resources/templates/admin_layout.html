<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <title>Kids Garden - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { display: flex; min-height: 100vh; overflow-x: hidden; background-color: #edf7e9; }
        
        /* Thanh menu bên trái (Sidebar) */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1f4f2b 0%, #2e7d32 100%);
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100%;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        /* Nội dung chính (Content) */
        .content {
            width: calc(100% - 260px);
            margin-left: 260px; /* Đẩy nội dung sang phải để không bị menu đè lên */
            padding: 0;
        }

        .sidebar-brand {
            text-align: center;
            padding: 10px 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 20px;
        }

        .sidebar-brand h4 {
            font-weight: 700;
            margin: 0;
            color: #fff;
            letter-spacing: 1px;
        }

        .sidebar a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 14px 24px;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
            font-size: 1.05rem;
        }

        .sidebar a:hover {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border-left-color: #81c784;
        }

        .sidebar .active {
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            border-left-color: #4caf50;
            font-weight: 600;
        }

        .sidebar a span:first-child {
            margin-right: 12px;
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-divider {
            height: 1px;
            background-color: rgba(255,255,255,0.15);
            margin: 15px 20px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h4>🌿 Kids Garden</h4>
    </div>

    <div class="sidebar-menu">
        <a th:href="@{/admin/home}" th:classappend="${page == 'home'} ? 'active' : ''">
            <span>🏠</span><span class="menu-text">Trang chủ</span>
        </a>
        <a th:href="@{/admin/category}" th:classappend="${page == 'category'} ? 'active' : ''">
            <span>📂</span><span class="menu-text">Quản lý danh mục</span>
        </a>
        <a th:href="@{/admin/coupons}" th:classappend="${page == 'coupons'} ? 'active' : ''">
            <span>🎟️</span><span class="menu-text">Mã giảm giá</span>
        </a>
        <a th:href="@{/admin/customer}" th:classappend="${page == 'customer'} ? 'active' : ''">
            <span>👥</span><span class="menu-text">Người mua hàng</span>
        </a>
        <a th:href="@{/admin/order}" th:classappend="${page == 'order'} ? 'active' : ''">
            <span>📦</span><span class="menu-text">Quản lý đơn hàng</span>
        </a>
        <a th:href="@{/admin/statistics}" th:classappend="${page == 'statistics'} ? 'active' : ''">
            <span>📊</span><span class="menu-text">Thống kê</span>
        </a>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-menu">
            <form th:action="@{/admin/logout}" method="post" id="logoutForm" style="display: none;"></form>        <a href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit();" style="color: #ff9e9e;">
            <span>🚪</span><span class="menu-text">Đăng xuất</span>
        </a>
    </div>
</div>

<div class="content">
    <div th:insert="~{ :: section}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
