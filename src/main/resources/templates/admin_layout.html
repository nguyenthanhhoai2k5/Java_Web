<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout">
<head>
    <meta charset="UTF-8">
    <title>Fashion Store - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; overflow-x: hidden; }
        /* Sidebar chiếm 20% */
        .sidebar {
            width: 15%;
            background-color: #212529;
            color: white;
            padding: 20px 0;
            position: fixed;
            height: 100%;
        }
        /* Content chiếm 80% */
        .content {
            width: 85%;
            margin-left: 20%; /* Đẩy sang phải để không bị sidebar đè lên */
            padding: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            transition: 0.3s;
        }
        .sidebar a:hover { background-color: #343a40; }
        .sidebar .active { background-color: #0d6efd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4">Fashion Admin</h4>
    <hr>
    <a th:href="@{/admin/home}" th:classappend="${page == 'home'} ? 'active' : ''">🏠 Trang chủ</a>
    <a th:href="@{/admin/category}" th:classappend="${page == 'category'} ? 'active' : ''">📂 Quản lý danh mục</a>
    <a th:href="@{/admin/coupons}" th:classappend="${page == 'coupons' ? 'active' : ''}">🎟️ Quản lý mã giảm giá</a>
    <a th:href="@{/admin/users}" th:classappend="${page == 'users'} ? 'active' : ''">👥 Quản lý người mua</a>
    <a th:href="@{/admin/order}" th:classappend="${page == 'order'} ? 'active' : ''">📦 Quản lý đơn hàng</a>
    <a th:href="@{/admin/statistics}" th:classappend="${page == 'statistics'} ? 'active' : ''">📊 Thống kê</a>
    <hr>
    <a href="/logout" class="text-danger">Đăng xuất</a>
</div>

<div class="content">
    <div th:insert="~{ :: section}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
