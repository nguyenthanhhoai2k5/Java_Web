<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị - Kids Garden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #edf7e9 0%, #cde2c5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(76, 175, 80, 0.15);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(76, 175, 80, 0.1);
        }
        .login-icon {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
        }
        .form-control {
            border-radius: 16px;
            padding: 12px 20px;
            border: 1px solid #cfe3ca;
            background-color: #f8fbf5;
            transition: all 0.3s;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(76, 175, 80, 0.25);
            border-color: #4caf50;
            background-color: #fff;
        }
        .btn-login {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            border: none;
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.25);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(76, 175, 80, 0.35);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-icon">
            <i class="fas fa-leaf text-white fa-3x"></i>
        </div>
        <h2 style="font-weight: 700; color: #1f4f2b; margin-bottom: 0.5rem;">Kids Garden</h2>
        <p style="color: #6c757d; margin-bottom: 2rem;">Hệ thống quản trị nội bộ</p>

        <div th:if="${param.error}" class="alert alert-danger" style="border-radius: 12px; font-size: 0.9rem;">
            Tài khoản hoặc mật khẩu không chính xác!
        </div>
        <div th:if="${param.logout}" class="alert alert-success" style="border-radius: 12px; font-size: 0.9rem;">
            Bạn đã đăng xuất an toàn!
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3 text-start">
                <label style="font-weight: 600; color: #2c5e2e; margin-bottom: 8px; font-size: 0.9rem;">
                    Tên đăng nhập (Email)
                </label>
                <div class="input-group">
                    <span class="input-group-text" style="background: transparent; border-right: none; border-color: #cfe3ca; border-radius: 16px 0 0 16px;">
                        <i class="fas fa-user" style="color: #4caf50;"></i>
                    </span>
                    <input type="text" name="username" class="form-control" style="border-left: none;" placeholder="Nhập email admin..." required>
                </div>
            </div>

            <div class="mb-3 text-start">
                <label style="font-weight: 600; color: #2c5e2e; margin-bottom: 8px; font-size: 0.9rem;">
                    Mật khẩu
                </label>
                <div class="input-group">
                    <span class="input-group-text" style="background: transparent; border-right: none; border-color: #cfe3ca; border-radius: 16px 0 0 16px;">
                        <i class="fas fa-lock" style="color: #4caf50;"></i>
                    </span>
                    <input type="password" name="password" class="form-control" style="border-left: none;" placeholder="Nhập mật khẩu..." required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                ĐĂNG NHẬP
            </button>
        </form>
    </div>

</body>
</html>
