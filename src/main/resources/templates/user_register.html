<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Garden - Đăng Ký Tài Khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #F0F7EE; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px;}
        .login-card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; max-width: 500px; width: 100%; }
        .btn-garden { background-color: #72B01D; color: white; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-garden:hover { background-color: #22577A; color: white; }
    </style>
</head>
<body>

<div class="card login-card p-4 p-md-5">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #72B01D;"><i class="bi bi-tree-fill"></i> KIDS GARDEN</h2>
        <p class="text-muted">Tạo tài khoản mới</p>
    </div>

    <div th:if="${error}" class="alert alert-danger rounded-pill text-center small" th:text="${error}"></div>

    <form th:action="@{/register/process}" th:object="${user}" method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold small text-muted ms-2">Họ và Tên</label>
            <input type="text" th:field="*{fullName}" class="form-control rounded-pill px-4 py-2" placeholder="VD: Nguyễn Văn A" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold small text-muted ms-2">Email (Dùng để đăng nhập)</label>
            <input type="email" th:field="*{email}" class="form-control rounded-pill px-4 py-2" placeholder="VD: email@gmail.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold small text-muted ms-2">Số điện thoại</label>
            <input type="text" th:field="*{phone}" class="form-control rounded-pill px-4 py-2" placeholder="0901234567" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold small text-muted ms-2">Mật khẩu</label>
            <input type="password" th:field="*{password}" class="form-control rounded-pill px-4 py-2" placeholder="Tạo mật khẩu (Ít nhất 6 ký tự)" required minlength="6">
        </div>

        <button type="submit" class="btn btn-garden w-100 py-2 mb-3 shadow-sm">ĐĂNG KÝ NGAY</button>
    </form>

    <div class="text-center small mt-3">
        Đã có tài khoản? <a th:href="@{/login}" class="text-success fw-bold text-decoration-none">Đăng nhập tại đây</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
