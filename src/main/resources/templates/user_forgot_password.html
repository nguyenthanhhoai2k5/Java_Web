<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu - Kids Garden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #F0F7EE; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;}
        .login-card { border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: none; max-width: 450px; width: 100%; }
        .btn-garden { background-color: #72B01D; color: white; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn-garden:hover { background-color: #22577A; color: white; }
    </style>
</head>
<body>

<div class="card login-card p-5">
    <div class="text-center mb-4">
        <div class="bg-light rounded-circle d-inline-flex p-3 mb-3 text-success">
            <i class="bi bi-envelope-at-fill fs-1"></i>
        </div>
        <h3 class="fw-bold" style="color: #22577A;">Quên Mật Khẩu?</h3>
        <p class="text-muted small">Đừng lo lắng! Hãy nhập email bạn đã đăng ký, chúng tôi sẽ gửi mật khẩu mới cho bạn.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger rounded-pill text-center small" th:text="${error}"></div>

    <form th:action="@{/forgot-password/process}" method="POST">
        <div class="mb-4">
            <input type="email" name="email" class="form-control rounded-pill px-4 py-2 text-center" placeholder="Nhập địa chỉ Email" required>
        </div>

        <button type="submit" class="btn btn-garden w-100 py-2 mb-3 shadow-sm">GỬI MẬT KHẨU MỚI</button>
    </form>

    <div class="text-center small mt-2">
        <a th:href="@{/login}" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Quay lại Đăng nhập</a>
    </div>
</div>

</body>
</html>
