<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Garden - Giỏ Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-garden: #72B01D; --dark-navy: #22577A; --light-garden: #F0F7EE; }
        body { font-family: 'Quicksand', sans-serif; color: var(--dark-navy); background-color: #f8f9fa; }
        .top-bar { background-color: var(--dark-navy); color: #fff; font-size: 13px; padding: 6px 0; }
        .top-bar a { color: #fff; text-decoration: none; transition: 0.3s; }
        .top-bar a:hover { color: var(--primary-garden); }
        .navbar { background-color: #fff; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
        .logo-text { font-size: 26px; font-weight: 700; color: var(--primary-garden); text-decoration: none; }
        .logo-text span { color: var(--dark-navy); }
        .nav-link { font-weight: 600; color: var(--dark-navy); margin: 0 10px; }
        .search-box { max-width: 250px; }
        .search-box .form-control { font-size: 14px; border-radius: 50px 0 0 50px; }
        .search-box .btn { border-radius: 0 50px 50px 0; background-color: var(--primary-garden); color: #fff; border: none; }
        .cart-table th { background-color: var(--light-garden); color: var(--dark-navy); font-weight: 700; border-bottom: none; }
        .cart-table td { vertical-align: middle; border-color: #f1f1f1; padding: 20px 10px; }
        .img-thumbnail-cart { width: 80px; height: 80px; object-fit: cover; border-radius: 15px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .btn-garden { background-color: var(--primary-garden); color: #fff; border-radius: 50px; border: none; font-weight: 700; padding: 12px; transition: 0.3s; }
        .btn-garden:hover { background-color: var(--dark-navy); color: #fff; }
        footer { background-color: #1A1C20; color: #fff; padding: 60px 0 20px; border-radius: 50px 50px 0 0; margin-top: 60px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <div><i class="bi bi-telephone-fill me-2"></i>Hotline: <strong>0123 456 789</strong></div>
        <div class="d-flex gap-3">
            <a th:href="@{/admin/home}"><i class="bi bi-shield-lock-fill me-1"></i>Trang Quản Trị</a>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container">
        <a class="logo-text" th:href="@{/home}"><i class="bi bi-tree-fill me-2"></i>KIDS<span>GARDEN</span></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <i class="bi bi-list fs-1 text-dark"></i>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-4 me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/shop}">Cửa hàng</a></li>
            </ul>
            <form class="d-flex search-box me-4" th:action="@{/search}" method="GET">
                <div class="input-group input-group-sm">
                    <input type="text" name="keyword" class="form-control border-end-0 shadow-none" placeholder="Tìm sản phẩm...">
                    <button class="btn px-3" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>
            <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                <a th:href="@{/shop/cart}" class="text-success position-relative">
                    <i class="bi bi-handbag-fill fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 10px;" th:text="${totalItems ?: 0}">0</span>
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5 pb-5">
    <div th:if="${message}" class="alert alert-success text-center rounded-pill" th:text="${message}"></div>

    <h2 class="fw-bold mb-4 text-center"><i class="bi bi-cart-check-fill me-2 text-success"></i>Giỏ Hàng Của Bạn</h2>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                <div class="table-responsive">
                    <table class="table cart-table mb-0">
                        <thead>
                        <tr class="text-uppercase small">
                            <th style="border-radius: 15px 0 0 15px;">Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th style="border-radius: 0 15px 15px 0;">Xóa</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${cartItems == null or cartItems.empty}">
                            <td colspan="5" class="text-center py-5 text-muted">Giỏ hàng của bạn đang trống!</td>
                        </tr>

                        <tr th:each="item : ${cartItems}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="img-thumbnail-cart">
                                        <i class="bi bi-box-seam text-muted fs-3"></i>
                                    </div>
                                    <div>
                                        <a th:href="@{'/shop/products/' + ${item.productId}}" class="fw-bold text-decoration-none text-dark d-block mb-1" th:text="${item.productName}">Tên SP</a>
                                    </div>
                                </div>
                            </td>
                            <td class="fw-bold" th:text="${#numbers.formatDecimal(item.price != null ? item.price : 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                            <td>
                                <form th:action="@{/shop/cart/update}" method="POST" class="d-flex align-items-center gap-2">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <input type="number" class="form-control form-control-sm text-center rounded-pill" name="quantity" th:value="${item.quantity}" min="1" style="width: 70px;">
                                    <button type="submit" class="btn btn-sm btn-outline-success rounded-circle" title="Cập nhật"><i class="bi bi-check2"></i></button>
                                </form>
                            </td>
                            <td class="fw-bold text-success" th:text="${#numbers.formatDecimal(item.subtotal != null ? item.subtotal : 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                            <td>
                                <form th:action="@{/shop/cart/remove}" method="POST">
                                    <input type="hidden" name="productId" th:value="${item.productId}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-circle"><i class="bi bi-trash3"></i></button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/shop}" class="btn btn-outline-secondary rounded-pill px-4"><i class="bi bi-arrow-left me-2"></i>Tiếp tục mua hàng</a>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="bg-white p-4 rounded-4 shadow-sm border border-light">
                <h5 class="fw-bold mb-4 border-bottom pb-3">Tóm tắt đơn hàng</h5>
                <div class="d-flex justify-content-between mb-3">
                    <span class="text-muted">Tổng phụ:</span>
                    <span class="fw-bold" th:text="${#numbers.formatDecimal(totalAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                </div>
                <hr class="text-muted my-4">
                <div class="d-flex justify-content-between mb-4 align-items-center">
                    <span class="fw-bold fs-5">Tổng tiền:</span>
                    <span class="fw-bold fs-4 text-success" th:text="${#numbers.formatDecimal(totalAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                </div>
                <button class="btn btn-garden w-100 shadow-sm" th:disabled="${cartItems == null or cartItems.empty}">TIẾN HÀNH THANH TOÁN</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <h5 class="fw-bold text-white mb-3"><a th:href="@{/home}" class="text-white text-decoration-none"><i class="bi bi-tree-fill"></i> KIDS GARDEN</a></h5>
        <p class="text-white-50 small mb-0">© 2026 Kids Garden Fashion.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
